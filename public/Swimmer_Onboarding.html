<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swimnerd Swimmer App - Onboarding</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: #0a0e27;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .phone-container {
            width: 375px;
            height: 812px;
            background: #1a1a1a;
            border-radius: 45px;
            padding: 12px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
            position: relative;
            border: 3px solid #2a2a2a;
        }

        .phone-screen {
            width: 100%;
            height: 100%;
            background: #0a0e27;
            border-radius: 35px;
            overflow: hidden;
            position: relative;
        }

        .dynamic-island {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 30px;
            background: #000;
            border-radius: 20px;
            z-index: 1000;
        }

        .progress-container {
            position: absolute;
            top: 55px;
            left: 0;
            right: 0;
            height: 4px;
            background: rgba(255,255,255,0.1);
            z-index: 999;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #f97316, #ea580c);
            width: 0%;
            transition: width 0.3s ease;
        }

        .screen {
            display: none;
            height: 100%;
            padding: 80px 30px 100px 30px;
            position: relative;
            animation: slideIn 0.3s ease;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .landing-screen {
            padding: 0;
            background: #0a0e27;
            color: white;
        }

        .landing-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 80px 30px 30px 30px;
            align-items: center;
            text-align: center;
        }

        .logo {
            width: 120px;
            height: 120px;
            margin-bottom: 40px;
            background: white;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }

        .landing-title {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 16px;
            line-height: 1.2;
        }

        .landing-subtitle {
            font-size: 18px;
            margin-bottom: 50px;
            opacity: 0.8;
            line-height: 1.5;
        }

        .features-preview {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 40px;
            width: 100%;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            border-left: 3px solid #f97316;
        }

        .feature-icon {
            font-size: 28px;
        }

        .feature-text {
            text-align: left;
            font-size: 14px;
            opacity: 0.9;
        }

        .continue-button {
            width: calc(100% - 60px);
            margin: 0 30px;
            padding: 18px;
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            position: absolute;
            bottom: 30px;
        }

        .continue-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(249, 115, 22, 0.3);
        }

        .secondary-link {
            text-align: center;
            margin-top: 70px;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 14px;
        }

        .screen-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .screen-title {
            font-size: 28px;
            font-weight: 700;
            color: white;
            margin-bottom: 16px;
            line-height: 1.2;
        }

        .screen-subtitle {
            font-size: 16px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .back-button {
            position: absolute;
            top: 70px;
            left: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            padding: 16px 20px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option:hover {
            background: rgba(255,255,255,0.08);
            border-color: #f97316;
        }

        .option.selected {
            background: rgba(249, 115, 22, 0.15);
            border-color: #f97316;
        }

        .option-icon {
            font-size: 24px;
        }

        .option-label {
            font-size: 16px;
            color: white;
            font-weight: 500;
        }

        .option-sublabel {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            margin-top: 4px;
        }

        .continue-button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: rgba(255,255,255,0.8);
            margin-bottom: 8px;
        }

        .input-field {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 16px;
        }

        .input-field:focus {
            outline: none;
            border-color: #f97316;
            background: rgba(255,255,255,0.08);
        }

        .checkbox {
            position: relative;
        }

        .checkbox.selected::before {
            content: "✓";
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #f97316;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <div class="phone-screen">
            <div class="dynamic-island"></div>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>

            <!-- SCREEN 0: Landing -->
            <div class="screen landing-screen active" id="screen0">
                <div class="landing-content">
                    <div class="logo">🏊‍♂️</div>
                    <h1 class="landing-title">Empower your swimming journey</h1>
                    <p class="landing-subtitle">Access world-class coaches, AI support, and a vibrant community.</p>
                    
                    <div class="features-preview">
                        <div class="feature-item">
                            <div class="feature-icon">📸</div>
                            <div class="feature-text">Track sets by taking a picture</div>
                        </div>
                        <div class="feature-item">
                            <div class="feature-icon">🛒</div>
                            <div class="feature-text">Hire world-class coaches & buy programs</div>
                        </div>
                        <div class="feature-item">
                            <div class="feature-icon">🤖</div>
                            <div class="feature-text">Generate personalized sets with AI</div>
                        </div>
                        <div class="feature-item">
                            <div class="feature-icon">💬</div>
                            <div class="feature-text">Connect with swimmers & coaches</div>
                        </div>
                    </div>

                    <a href="#" class="secondary-link">Already have an account? Sign In</a>
                </div>
                <button class="continue-button" onclick="nextScreen()">Get Started</button>
            </div>

            <!-- Add all your other screens (gender, experience, etc.) here -->
            <!-- Keeping just screen 0 for now to get approval on design -->

        </div>
    </div>

    <script>
        let currentScreen = 0;
        const totalScreens = 1; // Will be more when we add all screens back

        function updateProgress() {
            const progress = (currentScreen / (totalScreens - 1)) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        function nextScreen() {
            alert('Design approved? I\'ll add back all the other onboarding screens (gender, experience, etc.)');
        }

        updateProgress();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swimnerd Swimmer App - Welcome</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #e6f4fa 0%, #cfe9f5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .phone-container {
            width: 375px;
            height: 812px;
            background: #1a1a1a;
            border-radius: 45px;
            padding: 12px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.3);
            position: relative;
            border: 3px solid #2a2a2a;
        }

        .phone-screen {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #e6f4fa 0%, #cfe9f5 100%);
            border-radius: 35px;
            overflow: hidden;
            position: relative;
        }

        .dynamic-island {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 30px;
            background: #000;
            border-radius: 20px;
            z-index: 1000;
        }

        .progress-container {
            position: absolute;
            top: 55px;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(0,0,0,0.05);
            z-index: 999;
        }

        .progress-bar {
            height: 100%;
            background: #0088cc;
            width: 0%;
            transition: width 0.3s ease;
        }

        /* Header with logo */
        .header {
            padding: 70px 20px 20px 20px;
            text-align: center;
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: #0088cc;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a1a;
        }

        /* Main content */
        .content {
            padding: 0 30px;
            text-align: center;
        }

        .icon-card {
            width: 140px;
            height: 140px;
            background: white;
            border-radius: 30px;
            margin: 0 auto 30px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            position: relative;
        }

        .icon-card::before {
            content: '↗';
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 18px;
            opacity: 0.3;
        }

        .water-icon {
            width: 80px;
            height: 80px;
            background: #0088cc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .water-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .main-title {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 12px;
            line-height: 1.2;
        }

        .main-title .highlight {
            color: #0088cc;
        }

        .subtitle {
            font-size: 16px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        /* Buttons */
        .button-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #0088cc;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary:hover {
            background: #0077b3;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,136,204,0.3);
        }

        .btn-secondary {
            background: white;
            color: #0088cc;
            border: 2px solid #e0e0e0;
        }

        .btn-secondary:hover {
            border-color: #0088cc;
            transform: translateY(-2px);
        }

        .arrow {
            font-size: 20px;
        }

        /* Feature preview (for subsequent screens) */
        .features {
            display: none;
            flex-direction: column;
            gap: 12px;
            margin-top: 30px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            background: white;
            border-radius: 12px;
            text-align: left;
        }

        .feature-icon {
            width: 40px;
            height: 40px;
            background: #f0f9ff;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .feature-text {
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <div class="phone-screen">
            <div class="dynamic-island"></div>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>

            <div class="header">
                <div class="logo-container">
                    <img src="/swimnerd-logo.png" alt="Swimnerd" style="height: 32px;">
                </div>
            </div>

            <div class="content">
                <div class="icon-card">
                    <div class="water-icon">
                        <img src="/swimnerd-logo.png" alt="Swimnerd">
                    </div>
                </div>

                <h1 class="main-title">Train Smarter, <span class="highlight">Swim Faster</span></h1>
                <p class="subtitle">The ultimate platform for swimmers to track progress, connect with coaches, and achieve their goals with AI-powered insights.</p>

                <div class="button-container">
                    <button class="btn btn-primary" onclick="nextScreen()">
                        Start Your Journey
                        <span class="arrow">→</span>
                    </button>
                    <button class="btn btn-secondary" onclick="signIn()">
                        Sign In
                    </button>
                </div>

                <!-- Hidden for now, will show on next screens -->
                <div class="features">
                    <div class="feature-item">
                        <div class="feature-icon">📸</div>
                        <div class="feature-text">Track sets by taking a picture</div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">🛒</div>
                        <div class="feature-text">Hire world-class coaches</div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">🤖</div>
                        <div class="feature-text">Generate personalized sets with AI</div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">💬</div>
                        <div class="feature-text">Connect with swimmers & coaches</div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        let currentScreen = 0;

        function updateProgress() {
            const progress = (currentScreen / 10) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        function nextScreen() {
            alert('Onboarding continues... (gender, experience, etc.)');
            // In real app: navigate to next onboarding screen
        }

        function signIn() {
            alert('Navigate to sign in');
        }

        updateProgress();
    </script>
</body>
</html>
